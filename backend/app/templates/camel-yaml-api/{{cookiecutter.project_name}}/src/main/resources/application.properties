# {{ cookiecutter.project_name }} - Camel Quarkus Configuration

# Application
quarkus.application.name={{ cookiecutter.project_name }}

# HTTP Server
quarkus.http.port={{ cookiecutter.port }}
quarkus.http.host=0.0.0.0

# Camel
camel.context.name={{ cookiecutter.project_name }}

# YAML DSL route discovery
camel.main.routes-include-pattern=classpath:camel/*.yaml

# Health checks (used by Kubernetes probes)
quarkus.health.enabled=true
quarkus.smallrye-health.root-path=/q/health

# Prometheus metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.apache.camel".level=INFO
